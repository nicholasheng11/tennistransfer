<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#11203a" />
  <title>D1 Tennis Transfer Tracker</title>
  <meta name="description" content="Live tracker of D1 men's and women's tennis transfer portal entries and commitments. Filter by conference, ranking, and UTR." />

  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tennis Transfers" />

  <!-- Open Graph / social previews — show a rich card when the URL is shared on X, iMessage, Slack, etc. -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tennistransferportal.com/" />
  <meta property="og:title" content="D1 Tennis Transfer Tracker" />
  <meta property="og:description" content="Live tracker of D1 men's and women's tennis transfer portal entries and commitments. Filter by conference, ranking, and UTR." />
  <meta property="og:image" content="https://tennistransferportal.com/icon.svg" />
  <meta property="og:site_name" content="Tennis Transfer Portal" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="D1 Tennis Transfer Tracker" />
  <meta name="twitter:description" content="Live tracker of D1 men's and women's tennis transfer portal entries and commitments. Filter by conference, ranking, and UTR." />
  <meta name="twitter:image" content="https://tennistransferportal.com/icon.svg" />

  <style>
    /* ---- Colors & basics ---------------------------------------------- */
    :root {
      --navy: #11203a;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1a1d23;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #16a34a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    /* ---- Sticky header: title, search, filter pills + sort ------------- */
    header {
      background: var(--navy);
      color: #fff;
      padding: 18px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.75; margin-top: 2px; }
    header p.stats { font-size: 13px; opacity: 0.9; margin-top: 4px; font-weight: 500; letter-spacing: 0.2px; }
    header p.disclaimer { font-size: 11px; margin-top: 3px; line-height: 1.35; }
    /* Contact line — sits below the disclaimer. opacity:1 so the link can be a brighter
       sky-blue (#93c5fd) against the navy header, while the lead-in text stays muted. */
    header p.contact { font-size: 11px; margin-top: 5px; line-height: 1.35; opacity: 1; color: rgba(255,255,255,0.75); }
    header p.contact a { color: #93c5fd; text-decoration: none; white-space: nowrap; }
    header p.contact a:hover { text-decoration: underline; }

    .search {
      margin-top: 12px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }

    /* filter pills (scrollable) on the left, sort dropdown on the right */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .filter-btn {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active { background: #fff; color: var(--navy); font-weight: 600; }
    .pill-count { font-size: 12px; opacity: 0.6; margin-left: 4px; font-weight: 600; }
    /* Gender pills sit on their own row above the status pills. */
    #gender-filters { margin-top: 10px; }

    .sortwrap { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; }
    .sortwrap label { font-size: 13px; color: #fff; opacity: 0.75; }
    .sortwrap select {
      font-size: 13px;
      padding: 6px 8px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    /* ---- Result count + the grid of player cards ---------------------- */
    .count { color: var(--muted); font-size: 13px; padding: 14px 16px 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 12px 16px 40px;
    }

    /* ---- Card: clean border, lift + shadow on hover ------------------- */
    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px 18px;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(17, 32, 58, 0.10);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .name { font-size: 16px; font-weight: 700; flex: 1; min-width: 0; }
    .year { font-size: 13px; font-weight: 500; color: var(--muted); }

    /* school transfer line is the visual focus: bold names, light arrow */
    .schools { margin-top: 8px; font-size: 15px; font-weight: 600; color: var(--text); }
    .arrow { color: #9ca3af; font-weight: 400; padding: 0 6px; }
    .rank { font-size: 0.85em; color: #6b7280; font-weight: 500; margin-left: 4px; }

    .meta { margin-top: 8px; font-size: 12px; color: #6b7280; }
    .updated { cursor: help; }
    .utr { font-weight: 600; cursor: help; }
    .singles { font-weight: 600; cursor: help; }
    .utr-note { font-size: 0.75em; color: #9ca3af; font-weight: 400; }

    /* ---- Status badges (one color per status) ------------------------- */
    .badge {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge.inportal  { background: #dbeafe; color: #1e40af; }
    .badge.committed { background: #d1fae5; color: #065f46; }

    .empty { padding: 40px 16px; text-align: center; color: var(--muted); }

    /* ---- Mobile: full-width cards, badge stays inline next to name ---- */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .card-top { gap: 8px; }
    }
  </style>
</head>

<body>
  <header>
    <h1>🎾 D1 Tennis Transfer Tracker</h1>
    <p id="stats" class="stats"></p>
    <p id="subtitle"></p>
    <p class="disclaimer">UTRs reflect each player's rating at the time their card was last updated, not live ratings. ITA doubles rankings reflect each player's team at their previous school.</p>
    <p class="contact">For updates, submissions, or fixes, email <a href="mailto:support@tennistransferportal.com">support@tennistransferportal.com</a></p>
    <input id="search" class="search" type="text" placeholder="Search player or school..." />
    <div id="gender-filters" class="filters"></div>
    <div class="controls">
      <div id="filters" class="filters"></div>
      <div class="sortwrap">
        <label for="sort">Sort:</label>
        <select id="sort">
          <option value="newest">Newest</option>
          <option value="rankHigh">Highest ranked destination</option>
          <option value="utr">Highest UTR</option>
          <option value="singles">Singles ITA High</option>
        </select>
      </div>
      <div class="sortwrap">
        <label for="p4">Schools:</label>
        <select id="p4">
          <option value="all">All schools</option>
          <option value="p4p4">P4 to P4</option>
          <option value="p4mid">P4 to Mid-Major</option>
          <option value="midp4">Mid-Major to P4</option>
          <option value="midmid">Mid-Major to Mid-Major</option>
          <option value="sec">To SEC</option>
          <option value="bigten">To Big Ten</option>
          <option value="big12">To Big 12</option>
          <option value="acc">To ACC</option>
          <option value="ttop">To Team ITA High</option>
        </select>
      </div>
    </div>
  </header>

  <div id="count" class="count"></div>
  <div id="grid" class="grid"></div>

  <!-- Rankings + data load first, then the code that displays them -->
  <script src="rankings.js"></script>
  <script src="rankings-w.js"></script>
  <script src="singles-m.js"></script>
  <script src="singles-w.js"></script>
  <script src="doubles-m.js"></script>
  <script src="doubles-w.js"></script>
  <script src="transfers.js"></script>
  <script>
    // The two statuses, plus "All", in the order they appear as filter buttons.
    const STATUSES = ["All", "In Portal", "Committed"];
    // Gender pills (top row). Maps to player.gender = "M" / "W".
    const GENDERS = ["All", "Men's", "Women's"];

    // What's currently selected. These drive everything on screen.
    let activeGender = "All";
    let activeFilter = "All";
    let searchText = "";
    let sortBy = "newest";
    let p4Filter = "all";

    // Page elements we'll be updating.
    const grid = document.getElementById("grid");
    const countEl = document.getElementById("count");
    const filtersEl = document.getElementById("filters");
    const genderFiltersEl = document.getElementById("gender-filters");
    const searchEl = document.getElementById("search");
    const sortEl = document.getElementById("sort");
    const p4El = document.getElementById("p4");
    const subtitleEl = document.getElementById("subtitle");

    // Power 4 conference members (ACC, SEC, Big Ten, Big 12) — drives the "Schools" filter.
    // Edit this list if a school is missing or the spelling doesn't match your data.
    // Power 4 conference rosters — single source of truth. To edit, just update the right Set
    // (e.g., when a team changes conferences). POWER4 below is computed from them.
    const SEC = new Set(["Alabama","Arkansas","Auburn","Florida","Georgia","Kentucky","LSU","Mississippi State","Missouri","Oklahoma","Ole Miss","South Carolina","Tennessee","Texas","Texas A&M","Vanderbilt"]);
    const BIG_TEN = new Set(["Illinois","Indiana","Iowa","Maryland","Michigan","Michigan State","Minnesota","Nebraska","Northwestern","Ohio State","Oregon","Penn State","Purdue","Rutgers","UCLA","USC","Washington","Wisconsin"]);
    const BIG_12 = new Set(["Arizona","Arizona State","Baylor","BYU","UCF","Cincinnati","Colorado","Houston","Iowa State","Kansas","Kansas State","Oklahoma State","TCU","Texas Tech","Utah","West Virginia"]);
    const ACC = new Set(["Boston College","California","Cal","Clemson","Duke","Florida State","Georgia Tech","Louisville","Miami","Miami (FL)","NC State","North Carolina","UNC","Notre Dame","Pitt","Pittsburgh","SMU","Stanford","Syracuse","Virginia","Virginia Tech","Wake Forest"]);
    const POWER4 = new Set([...SEC, ...BIG_TEN, ...BIG_12, ...ACC]);
    // Some players have a comma-separated `previousSchool` listing multiple stops
    // (e.g. "UCF, Oklahoma State"). For P4 / Mid-Major classification, what matters is
    // the LAST one — the school they're actually transferring FROM right now.
    const mostRecentSchool = s => {
      if (!s) return "";
      const i = s.lastIndexOf(",");
      return (i === -1 ? s : s.slice(i + 1)).trim();
    };
    const isP4 = school => POWER4.has(mostRecentSchool(school));

    // Known non-D1 (D2 / JUCO / NAIA) schools that appear in the data — excluded from "Mid-Major"
    // (which means a Division I program that isn't Power 4). Add to this list if a non-D1 school shows up.
    const NON_D1 = new Set(["UIndy","Midwestern State","West Alabama","Saint Leo","Collin College","Middle Georgia State","Mississippi College","Le Moyne","Rollins College","Valdosta State","Ferris State","Auburn-Montgomery","Hawaii Pacific"]);
    const isMidMajor = school => {
      const s = mostRecentSchool(school);
      return !!s && !POWER4.has(s) && !NON_D1.has(s);
    };

    // ITA team rankings (M + W). Lookup picks the right table by player gender; missing gender falls back to M.
    const RANKINGS_M = (typeof ITA_RANKINGS_M !== "undefined" && ITA_RANKINGS_M) ? ITA_RANKINGS_M : {};
    const RANKINGS_W = (typeof ITA_RANKINGS_W !== "undefined" && ITA_RANKINGS_W) ? ITA_RANKINGS_W : {};
    const rankOf = (school, gender) => {
      const table = (gender === "W") ? RANKINGS_W : RANKINGS_M;
      return (school && table[school] != null) ? table[school] : null;
    };

    // ITA singles rankings (M + W). Same gender routing.
    const SINGLES_M = (typeof ITA_SINGLES_M !== "undefined" && ITA_SINGLES_M) ? ITA_SINGLES_M : {};
    const SINGLES_W = (typeof ITA_SINGLES_W !== "undefined" && ITA_SINGLES_W) ? ITA_SINGLES_W : {};
    const singlesRankOf = (name, gender) => {
      const key = (name || "").toLowerCase();
      const table = (gender === "W") ? SINGLES_W : SINGLES_M;
      return (key && table[key] != null) ? table[key] : null;
    };

    // ITA doubles rankings (M + W). Same gender routing.
    const DOUBLES_M = (typeof ITA_DOUBLES_M !== "undefined" && ITA_DOUBLES_M) ? ITA_DOUBLES_M : {};
    const DOUBLES_W = (typeof ITA_DOUBLES_W !== "undefined" && ITA_DOUBLES_W) ? ITA_DOUBLES_W : {};
    const doublesRankOf = (name, gender) => {
      const key = (name || "").toLowerCase();
      const table = (gender === "W") ? DOUBLES_W : DOUBLES_M;
      return (key && table[key] != null) ? table[key] : null;
    };

    // Turn a status like "In Portal" into a CSS class like "inportal".
    function badgeClass(status) {
      return status.toLowerCase().replace(/\s+/g, "");
    }

    // Keep names/schools safe to drop into HTML.
    function esc(str) {
      return String(str).replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // "2026-05-26" -> "May 26, 2026"
    function formatLong(iso) {
      if (!iso) return "";
      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
      const p = iso.split("-");
      return months[Number(p[1]) - 1] + " " + Number(p[2]) + ", " + p[0];
    }

    // Does a player match the selected gender pill? "All" matches everyone.
    function genderMatch(p, g) {
      if (g === "All") return true;
      if (g === "Men's") return p.gender === "M";
      if (g === "Women's") return p.gender === "W";
      return true;
    }
    // Total count of players for a given gender pill (drives the gender pill counts — static, not affected by status).
    function genderCount(g) {
      return TRANSFERS.filter(p => genderMatch(p, g)).length;
    }
    // How many players have a given status WITHIN the currently selected gender (drives status pill counts).
    function statusCount(status) {
      const within = TRANSFERS.filter(p => genderMatch(p, activeGender));
      return status === "All" ? within.length : within.filter(p => p.status === status).length;
    }
    // Refresh status pill labels (called whenever the gender selection changes).
    function refreshStatusPills() {
      document.querySelectorAll('.filter-btn[data-status]').forEach(btn => {
        const status = btn.dataset.status;
        btn.innerHTML = esc(status) + ' <span class="pill-count">' + statusCount(status) + '</span>';
      });
    }

    // Header stats line — counts respect the currently selected gender pill.
    const statsEl = document.getElementById("stats");
    function refreshStats() {
      const within = TRANSFERS.filter(p => genderMatch(p, activeGender));
      const total = within.length;
      const committed = within.filter(p => p.status === "Committed").length;
      const inPortal = within.filter(p => p.status === "In Portal").length;
      statsEl.textContent = "📊 " + total + " players · " + committed + " committed · " + inPortal + " in portal";
    }

    // Subtitle shows the most recent dateUpdated across all players.
    const latest = TRANSFERS.reduce((mx, p) => (p.dateUpdated > mx ? p.dateUpdated : mx), "");
    subtitleEl.textContent = latest ? "Last updated: " + formatLong(latest) : "Updated by hand";

    // Build the gender filter buttons (top row).
    GENDERS.forEach(g => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (g === activeGender ? " active" : "");
      btn.dataset.gender = g;
      btn.innerHTML = esc(g) + ' <span class="pill-count">' + genderCount(g) + '</span>';
      btn.onclick = () => {
        activeGender = g;
        document.querySelectorAll('.filter-btn[data-gender]')
          .forEach(b => b.classList.toggle("active", b.dataset.gender === g));
        refreshStatusPills();
        refreshStats();
        render();
      };
      genderFiltersEl.appendChild(btn);
    });

    // Build the status filter buttons (row below gender), each with its count.
    STATUSES.forEach(status => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (status === activeFilter ? " active" : "");
      btn.dataset.status = status;
      btn.innerHTML = esc(status) + ' <span class="pill-count">' + statusCount(status) + '</span>';
      btn.onclick = () => {
        activeFilter = status;
        document.querySelectorAll('.filter-btn[data-status]')
          .forEach(b => b.classList.toggle("active", b.dataset.status === status));
        render();
      };
      filtersEl.appendChild(btn);
    });

    searchEl.oninput = () => { searchText = searchEl.value.toLowerCase(); render(); };
    sortEl.onchange  = () => { sortBy = sortEl.value; render(); };
    p4El.onchange    = () => { p4Filter = p4El.value; render(); };

    // The main function: decide which players to show, then draw them.
    function render() {
      let players = TRANSFERS.slice(); // copy so we don't reorder the original

      // 0. filter by gender (applied first, before status)
      if (activeGender !== "All") {
        players = players.filter(p => genderMatch(p, activeGender));
      }

      // 1. filter by the selected status
      if (activeFilter !== "All") {
        players = players.filter(p => p.status === activeFilter);
      }

      // 2. filter by the search box (name or either school)
      if (searchText) {
        players = players.filter(p =>
          (p.name + " " + p.previousSchool + " " + p.newSchool)
            .toLowerCase().includes(searchText));
      }

      // 2b. School filter: Power 4 or Mid-Major, by destination ("to") or origin ("from")
      if (p4Filter === "p4p4") {
        players = players.filter(p => isP4(p.previousSchool) && isP4(p.newSchool));
      } else if (p4Filter === "p4mid") {
        players = players.filter(p => isP4(p.previousSchool) && isMidMajor(p.newSchool));
      } else if (p4Filter === "midp4") {
        players = players.filter(p => isMidMajor(p.previousSchool) && isP4(p.newSchool));
      } else if (p4Filter === "midmid") {
        players = players.filter(p => isMidMajor(p.previousSchool) && isMidMajor(p.newSchool));
      } else if (p4Filter === "sec") {
        players = players.filter(p => SEC.has(p.newSchool));
      } else if (p4Filter === "bigten") {
        players = players.filter(p => BIG_TEN.has(p.newSchool));
      } else if (p4Filter === "big12") {
        players = players.filter(p => BIG_12.has(p.newSchool));
      } else if (p4Filter === "acc") {
        players = players.filter(p => ACC.has(p.newSchool));
      } else if (p4Filter === "ttop") {
        // Only players committing to a Team ITA-ranked program (top 75 — full coverage of the rankings file).
        players = players.filter(p => {
          const r = rankOf(p.newSchool, p.gender);
          return r != null && r <= 75;
        });
      }

      // 3. sort
      // "To Team ITA High" is a sort-aware filter: when it's active, we force best-team-rank-first
      // ordering (Texas #2 above Texas A&M #11 above ... #75) regardless of the Sort dropdown.
      const effectiveSort = (p4Filter === "ttop") ? "rankHigh" : sortBy;
      if (effectiveSort === "rankHigh") {
        // By destination ITA rank, best (#1) first. Unranked / In Portal players sort
        // to the bottom, newest-first among themselves.
        players.sort((a, b) => {
          const ra = rankOf(a.newSchool, a.gender), rb = rankOf(b.newSchool, b.gender);
          const aR = ra != null, bR = rb != null;
          if (aR && bR) return ra - rb;
          if (aR) return -1;
          if (bR) return 1;
          return b.dateUpdated.localeCompare(a.dateUpdated);
        });
      } else if (effectiveSort === "utr") {
        // Highest UTR first; players with no UTR sort to the bottom (newest-first tiebreak).
        players.sort((a, b) => {
          const ua = parseFloat(a.utr), ub = parseFloat(b.utr);
          const aH = !isNaN(ua), bH = !isNaN(ub);
          if (aH && bH) return ub - ua;
          if (aH) return -1;
          if (bH) return 1;
          return b.dateUpdated.localeCompare(a.dateUpdated);
        });
      } else if (effectiveSort === "singles") {
        // Best ITA singles ranking first (#1 first); players outside top 125 to the bottom (newest-first tiebreak).
        players.sort((a, b) => {
          const ra = singlesRankOf(a.name, a.gender), rb = singlesRankOf(b.name, b.gender);
          const aR = ra != null, bR = rb != null;
          if (aR && bR) return ra - rb;
          if (aR) return -1;
          if (bR) return 1;
          return b.dateUpdated.localeCompare(a.dateUpdated);
        });
      } else if (effectiveSort === "newSchool") {
        players.sort((a, b) => (a.newSchool || "￿").localeCompare(b.newSchool || "￿"));
      } else if (effectiveSort === "prevSchool") {
        players.sort((a, b) => a.previousSchool.localeCompare(b.previousSchool));
      } else {
        players.sort((a, b) => b.dateUpdated.localeCompare(a.dateUpdated));
      }

      // 4. show the result count
      countEl.textContent = players.length + (players.length === 1 ? " player" : " players");

      // 5. draw a card for each player (or an empty message)
      if (players.length === 0) {
        const msg = (activeGender === "Women's")
          ? "No women's players yet — coverage launching soon."
          : "No players match. Try a different filter or search.";
        grid.innerHTML = '<div class="empty">' + esc(msg) + '</div>';
        return;
      }

      grid.innerHTML = players.map(p => {
        const newRank = rankOf(p.newSchool, p.gender);
        const newRankTag = (newRank != null) ? '<span class="rank">#' + newRank + '</span>' : '';
        // Previous-school rank — skip lookup for multi-school strings like "Arkansas, Charlotte".
        const prevRank = p.previousSchool.includes(",") ? null : rankOf(p.previousSchool, p.gender);
        const prevRankTag = (prevRank != null) ? '<span class="rank">#' + prevRank + '</span>' : '';
        const prev = esc(p.previousSchool) + prevRankTag;
        const schools = p.newSchool
          ? prev + '<span class="arrow">&rarr;</span>' + esc(p.newSchool) + newRankTag
          : prev;
        // Singles + Doubles rankings go inline next to the name (where class year used to be).
        // Class year is kept in the data but no longer shown on cards.
        const singlesRank = singlesRankOf(p.name, p.gender);
        const doublesRank = doublesRankOf(p.name, p.gender);
        let inlineRank = "";
        if (singlesRank != null) inlineRank += ' <span class="year" title="ITA Singles #' + singlesRank + ' as of 2026-05-20">&middot; Singles #' + singlesRank + '</span>';
        if (doublesRank != null) inlineRank += ' <span class="year" title="ITA Doubles #' + doublesRank + ' as of 2026-05-20">&middot; Doubles #' + doublesRank + '</span>';
        // Bottom meta line: country and/or UTR. Hidden entirely if both empty.
        const metaParts = [];
        if (p.country) metaParts.push(esc(p.country));
        if (p.utr) metaParts.push('<span class="utr" title="UTR ' + esc(p.utr) + ' as of ' + esc(p.dateUpdated) + '">UTR ' + esc(p.utr) + ' <span class="utr-note">(at update)</span></span>');
        const meta = metaParts.length ? '<div class="meta">' + metaParts.join(' &middot; ') + '</div>' : '';
        return `
          <div class="card">
            <div class="card-top">
              <div class="name">${esc(p.name)}${inlineRank}</div>
              <div class="badge ${badgeClass(p.status)}">${esc(p.status)}</div>
            </div>
            <div class="schools">${schools}</div>
            ${meta}
          </div>`;
      }).join("");
    }

    refreshStats();   // initial header counts
    render(); // draw everything for the first time
  </script>
</body>
</html>
