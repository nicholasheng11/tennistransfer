<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#11203a" />
  <title>D1 Men's Tennis Transfer Tracker</title>

  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tennis Transfers" />

  <style>
    /* ---- Colors & basics ---------------------------------------------- */
    :root {
      --navy: #11203a;
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #1a1d23;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #16a34a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }

    /* ---- Sticky header: title, search, filter pills + sort ------------- */
    header {
      background: var(--navy);
      color: #fff;
      padding: 18px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 13px; opacity: 0.75; margin-top: 2px; }
    header p.disclaimer { font-size: 11px; margin-top: 3px; line-height: 1.35; }

    .search {
      margin-top: 12px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
    }

    /* filter pills (scrollable) on the left, sort dropdown on the right */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .filters {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      flex: 1 1 auto;
      min-width: 0;
    }
    .filter-btn {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.12);
      color: #fff;
      border: none;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active { background: #fff; color: var(--navy); font-weight: 600; }
    .pill-count { font-size: 12px; opacity: 0.6; margin-left: 4px; font-weight: 600; }

    .sortwrap { flex: 0 0 auto; display: flex; align-items: center; gap: 6px; }
    .sortwrap label { font-size: 13px; color: #fff; opacity: 0.75; }
    .sortwrap select {
      font-size: 13px;
      padding: 6px 8px;
      border: none;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    /* ---- Result count + the grid of player cards ---------------------- */
    .count { color: var(--muted); font-size: 13px; padding: 14px 16px 0; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
      padding: 12px 16px 40px;
    }

    /* ---- Card: clean border, lift + shadow on hover ------------------- */
    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px 18px;
      transition: transform 150ms ease, box-shadow 150ms ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(17, 32, 58, 0.10);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .name { font-size: 16px; font-weight: 700; flex: 1; min-width: 0; }
    .year { font-size: 13px; font-weight: 500; color: var(--muted); }

    /* school transfer line is the visual focus: bold names, light arrow */
    .schools { margin-top: 8px; font-size: 15px; font-weight: 600; color: var(--text); }
    .arrow { color: #9ca3af; font-weight: 400; padding: 0 6px; }
    .rank { font-size: 0.85em; color: #6b7280; font-weight: 500; margin-left: 4px; }

    .meta { margin-top: 8px; font-size: 12px; color: #6b7280; }
    .updated { cursor: help; }
    .utr { font-weight: 600; cursor: help; }
    .utr-note { font-size: 0.75em; color: #9ca3af; font-weight: 400; }

    /* ---- Status badges (one color per status) ------------------------- */
    .badge {
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge.inportal  { background: #dbeafe; color: #1e40af; }
    .badge.committed { background: #fef3c7; color: #92400e; }
    .badge.signed    { background: #d1fae5; color: #065f46; }
    .badge.withdrawn { background: #f3f4f6; color: #6b7280; }

    .empty { padding: 40px 16px; text-align: center; color: var(--muted); }

    /* ---- Mobile: full-width cards, badge stays inline next to name ---- */
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .card-top { gap: 8px; }
    }
  </style>
</head>

<body>
  <header>
    <h1>🎾 D1 Men's Tennis Transfer Tracker</h1>
    <p id="subtitle"></p>
    <p class="disclaimer">UTRs reflect each player's rating at the time their card was last updated, not live ratings.</p>
    <input id="search" class="search" type="text" placeholder="Search player or school..." />
    <div class="controls">
      <div id="filters" class="filters"></div>
      <div class="sortwrap">
        <label for="sort">Sort:</label>
        <select id="sort">
          <option value="newest">Newest</option>
          <option value="rankHigh">Highest ranked destination</option>
          <option value="rankLow">Lowest ranked destination</option>
          <option value="utr">Highest UTR</option>
          <option value="newSchool">School A &rarr; Z</option>
          <option value="prevSchool">Previous school A &rarr; Z</option>
        </select>
      </div>
      <div class="sortwrap">
        <label for="p4">Schools:</label>
        <select id="p4">
          <option value="all">All schools</option>
          <option value="to">To Power 4</option>
          <option value="from">From Power 4</option>
          <option value="tomid">To Mid-Major</option>
          <option value="frommid">From Mid-Major</option>
        </select>
      </div>
    </div>
  </header>

  <div id="count" class="count"></div>
  <div id="grid" class="grid"></div>

  <!-- Rankings + data load first, then the code that displays them -->
  <script src="rankings.js"></script>
  <script src="transfers.js"></script>
  <script>
    // The four statuses, plus "All", in the order they appear as filter buttons.
    const STATUSES = ["All", "In Portal", "Committed", "Signed", "Withdrawn"];

    // What's currently selected. These drive everything on screen.
    let activeFilter = "All";
    let searchText = "";
    let sortBy = "newest";
    let p4Filter = "all";

    // Page elements we'll be updating.
    const grid = document.getElementById("grid");
    const countEl = document.getElementById("count");
    const filtersEl = document.getElementById("filters");
    const searchEl = document.getElementById("search");
    const sortEl = document.getElementById("sort");
    const p4El = document.getElementById("p4");
    const subtitleEl = document.getElementById("subtitle");

    // Power 4 conference members (ACC, SEC, Big Ten, Big 12) — drives the "Schools" filter.
    // Edit this list if a school is missing or the spelling doesn't match your data.
    const POWER4 = new Set([
      // SEC
      "Alabama","Arkansas","Auburn","Florida","Georgia","Kentucky","LSU","Mississippi State","Missouri","Oklahoma","Ole Miss","South Carolina","Tennessee","Texas","Texas A&M","Vanderbilt",
      // Big Ten
      "Illinois","Indiana","Iowa","Maryland","Michigan","Michigan State","Minnesota","Nebraska","Northwestern","Ohio State","Oregon","Penn State","Purdue","Rutgers","UCLA","USC","Washington","Wisconsin",
      // Big 12
      "Arizona","Arizona State","Baylor","BYU","UCF","Cincinnati","Colorado","Houston","Iowa State","Kansas","Kansas State","Oklahoma State","TCU","Texas Tech","Utah","West Virginia",
      // ACC
      "Boston College","California","Cal","Clemson","Duke","Florida State","Georgia Tech","Louisville","Miami","Miami (FL)","NC State","North Carolina","Notre Dame","Pitt","Pittsburgh","SMU","Stanford","Syracuse","Virginia","Virginia Tech","Wake Forest"
    ]);
    const isP4 = school => POWER4.has(school);

    // Known non-D1 (D2 / JUCO / NAIA) schools that appear in the data — excluded from "Mid-Major"
    // (which means a Division I program that isn't Power 4). Add to this list if a non-D1 school shows up.
    const NON_D1 = new Set(["UIndy","Midwestern State","West Alabama","Saint Leo","Collin College","Middle Georgia State","Mississippi College"]);
    const isMidMajor = school => !!school && !isP4(school) && !NON_D1.has(school);

    // ITA team rankings (rankings.js). Schools not listed are unranked.
    const RANKINGS = (typeof ITA_RANKINGS_M !== "undefined" && ITA_RANKINGS_M) ? ITA_RANKINGS_M : {};
    const rankOf = school => (school && RANKINGS[school] != null) ? RANKINGS[school] : null;

    // Turn a status like "In Portal" into a CSS class like "inportal".
    function badgeClass(status) {
      return status.toLowerCase().replace(/\s+/g, "");
    }

    // Keep names/schools safe to drop into HTML.
    function esc(str) {
      return String(str).replace(/[&<>"]/g, c =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // "2026-05-26" -> "May 26, 2026"
    function formatLong(iso) {
      if (!iso) return "";
      const months = ["January","February","March","April","May","June",
                      "July","August","September","October","November","December"];
      const p = iso.split("-");
      return months[Number(p[1]) - 1] + " " + Number(p[2]) + ", " + p[0];
    }

    // Relative "Updated ..." label from a YYYY-MM-DD date.
    function relativeUpdated(iso) {
      if (!iso) return "";
      const p = iso.split("-");
      const then = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
      const now = new Date();
      const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const days = Math.round((today - then) / 86400000);
      if (days <= 0) return "Updated today";
      if (days === 1) return "Updated yesterday";
      if (days <= 6) return "Updated " + days + " days ago";
      const mon = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return "Updated " + mon[then.getMonth()] + " " + then.getDate();
    }

    // How many players have a given status (drives the pill counts).
    function statusCount(status) {
      return status === "All"
        ? TRANSFERS.length
        : TRANSFERS.filter(p => p.status === status).length;
    }

    // Subtitle shows the most recent dateUpdated across all players.
    const latest = TRANSFERS.reduce((mx, p) => (p.dateUpdated > mx ? p.dateUpdated : mx), "");
    subtitleEl.textContent = latest ? "Last updated: " + formatLong(latest) : "Updated by hand";

    // Build the filter buttons, each with its count (e.g. "Committed 7").
    STATUSES.forEach(status => {
      const btn = document.createElement("button");
      btn.className = "filter-btn" + (status === activeFilter ? " active" : "");
      btn.dataset.status = status;
      btn.innerHTML = esc(status) + ' <span class="pill-count">' + statusCount(status) + '</span>';
      btn.onclick = () => {
        activeFilter = status;
        document.querySelectorAll(".filter-btn")
          .forEach(b => b.classList.toggle("active", b.dataset.status === status));
        render();
      };
      filtersEl.appendChild(btn);
    });

    searchEl.oninput = () => { searchText = searchEl.value.toLowerCase(); render(); };
    sortEl.onchange  = () => { sortBy = sortEl.value; render(); };
    p4El.onchange    = () => { p4Filter = p4El.value; render(); };

    // The main function: decide which players to show, then draw them.
    function render() {
      let players = TRANSFERS.slice(); // copy so we don't reorder the original

      // 1. filter by the selected status
      if (activeFilter !== "All") {
        players = players.filter(p => p.status === activeFilter);
      }

      // 2. filter by the search box (name or either school)
      if (searchText) {
        players = players.filter(p =>
          (p.name + " " + p.previousSchool + " " + p.newSchool)
            .toLowerCase().includes(searchText));
      }

      // 2b. School filter: Power 4 or Mid-Major, by destination ("to") or origin ("from")
      if (p4Filter === "to") {
        players = players.filter(p => isP4(p.newSchool));
      } else if (p4Filter === "from") {
        players = players.filter(p => isP4(p.previousSchool));
      } else if (p4Filter === "tomid") {
        players = players.filter(p => isMidMajor(p.newSchool));
      } else if (p4Filter === "frommid") {
        players = players.filter(p => isMidMajor(p.previousSchool));
      }

      // 3. sort
      if (sortBy === "rankHigh" || sortBy === "rankLow") {
        // By destination ITA rank. Ranked schools first (asc for High, desc for Low);
        // unranked / In Portal sort to the bottom, newest-first among themselves.
        players.sort((a, b) => {
          const ra = rankOf(a.newSchool), rb = rankOf(b.newSchool);
          const aR = ra != null, bR = rb != null;
          if (aR && bR) return sortBy === "rankHigh" ? ra - rb : rb - ra;
          if (aR) return -1;
          if (bR) return 1;
          return b.dateUpdated.localeCompare(a.dateUpdated);
        });
      } else if (sortBy === "utr") {
        // Highest UTR first; players with no UTR sort to the bottom (newest-first tiebreak).
        players.sort((a, b) => {
          const ua = parseFloat(a.utr), ub = parseFloat(b.utr);
          const aH = !isNaN(ua), bH = !isNaN(ub);
          if (aH && bH) return ub - ua;
          if (aH) return -1;
          if (bH) return 1;
          return b.dateUpdated.localeCompare(a.dateUpdated);
        });
      } else if (sortBy === "newSchool") {
        players.sort((a, b) => (a.newSchool || "￿").localeCompare(b.newSchool || "￿"));
      } else if (sortBy === "prevSchool") {
        players.sort((a, b) => a.previousSchool.localeCompare(b.previousSchool));
      } else {
        players.sort((a, b) => b.dateUpdated.localeCompare(a.dateUpdated));
      }

      // 4. show the result count
      countEl.textContent = players.length + (players.length === 1 ? " player" : " players");

      // 5. draw a card for each player (or an empty message)
      if (players.length === 0) {
        grid.innerHTML = '<div class="empty">No players match. Try a different filter or search.</div>';
        return;
      }

      grid.innerHTML = players.map(p => {
        const newRank = rankOf(p.newSchool);
        const newRankTag = (newRank != null) ? '<span class="rank">#' + newRank + '</span>' : '';
        // Previous-school rank — skip lookup for multi-school strings like "Arkansas, Charlotte".
        const prevRank = p.previousSchool.includes(",") ? null : rankOf(p.previousSchool);
        const prevRankTag = (prevRank != null) ? '<span class="rank">#' + prevRank + '</span>' : '';
        const prev = esc(p.previousSchool) + prevRankTag;
        const schools = p.newSchool
          ? prev + '<span class="arrow">&rarr;</span>' + esc(p.newSchool) + newRankTag
          : prev;
        const year = p.classYear ? ' <span class="year">&middot; ' + esc(p.classYear) + '</span>' : "";
        // Bottom meta line: hometown (if present) + relative "Updated ..." with exact-date tooltip.
        const updated = '<span class="updated" title="' + esc(p.dateUpdated) + '">' + esc(relativeUpdated(p.dateUpdated)) + '</span>';
        const metaParts = [];
        if (p.hometown) metaParts.push(esc(p.hometown));
        if (p.utr) metaParts.push('<span class="utr" title="UTR ' + esc(p.utr) + ' as of ' + esc(p.dateUpdated) + '">UTR ' + esc(p.utr) + ' <span class="utr-note">(at update)</span></span>');
        metaParts.push(updated);
        const meta = '<div class="meta">' + metaParts.join(' &middot; ') + '</div>';
        return `
          <div class="card">
            <div class="card-top">
              <div class="name">${esc(p.name)}${year}</div>
              <div class="badge ${badgeClass(p.status)}">${esc(p.status)}</div>
            </div>
            <div class="schools">${schools}</div>
            ${meta}
          </div>`;
      }).join("");
    }

    render(); // draw everything for the first time
  </script>
</body>
</html>
